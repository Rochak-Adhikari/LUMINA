[pytest]
# Phase 5.4 Order 5 — pytest provisioning.
#
# Scope: the unittest-style suites under tests/ (all test_phase_4_x and
# test_phase_5_x, test_port_recovery, and other unittest.TestCase files).
# One command runs them with the google SDK mock installed centrally by the
# root conftest.py (before any `core` import).
#
# NOT collected by pytest (they are script-style — they call sys.exit() at
# module scope and print their own "ALL TESTS PASSED"; run via `python <file>`):
#   - core/test_phase_1_4.py .. 1_8.py
#   - brain/test_phase_*.py
#   - tests/test_memory_suggest.py, test_phase_b1.py, test_phase_c.py,
#     test_phase_e3.py, test_runner.py
# These are intentionally left on their existing runner; converting them is
# out of Order 5 scope.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q -ra --continue-on-collection-errors
