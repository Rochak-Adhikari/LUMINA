<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_2 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_2" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_2');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Colors from Design System
const primaryAccent = new THREE.Color(0x00D4FF);
const secondaryAccent = new THREE.Color(0x68F0FF);

// Core Orb
const coreGeometry = new THREE.SphereGeometry(1.2, 64, 64);
const coreMaterial = new THREE.MeshPhongMaterial({
  color: primaryAccent,
  emissive: primaryAccent,
  emissiveIntensity: 0.5,
  transparent: true,
  opacity: 0.8,
  shininess: 100,
});
const core = new THREE.Mesh(coreGeometry, coreMaterial);
scene.add(core);

// Inner Glow/Energy
const innerGeometry = new THREE.SphereGeometry(1.4, 64, 64);
const innerMaterial = new THREE.MeshStandardMaterial({
  color: secondaryAccent,
  transparent: true,
  opacity: 0.2,
  wireframe: false,
});
const innerOrb = new THREE.Mesh(innerGeometry, innerMaterial);
scene.add(innerOrb);

// Rotating Rings
const ringGroup = new THREE.Group();
scene.add(ringGroup);

const createRing = (radius, tiltX, tiltY, speed) => {
  const geometry = new THREE.TorusGeometry(radius, 0.02, 16, 100);
  const material = new THREE.MeshBasicMaterial({ 
    color: primaryAccent, 
    transparent: true, 
    opacity: 0.3 
  });
  const ring = new THREE.Mesh(geometry, material);
  ring.rotation.x = tiltX;
  ring.rotation.y = tiltY;
  ring.userData = { speed };
  ringGroup.add(ring);
  return ring;
};

const rings = [
  createRing(1.8, Math.PI / 4, Math.PI / 6, 0.005),
  createRing(2.0, -Math.PI / 3, Math.PI / 4, -0.003),
  createRing(2.2, Math.PI / 2.5, -Math.PI / 5, 0.007)
];

// Particle System
const particlesCount = 200;
const particlesGeometry = new THREE.BufferGeometry();
const posArray = new Float32Array(particlesCount * 3);

for(let i = 0; i < particlesCount * 3; i++) {
  posArray[i] = (Math.random() - 0.5) * 6;
}
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

const particlesMaterial = new THREE.PointsMaterial({
  size: 0.03,
  color: secondaryAccent,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending
});

const particleMesh = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particleMesh);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(primaryAccent, 2, 10);
pointLight.position.set(2, 2, 2);
scene.add(pointLight);

// Animation Loop
const animate = () => {
  requestAnimationFrame(animate);
  const time = Date.now() * 0.001;

  // Breathing effect
  const scale = 1 + Math.sin(time * 0.5) * 0.05;
  core.scale.set(scale, scale, scale);
  innerOrb.scale.set(scale * 1.1, scale * 1.1, scale * 1.1);
  
  // Rotating rings
  ringGroup.children.forEach(ring => {
    ring.rotation.z += ring.userData.speed;
  });

  // Particle drift
  particleMesh.rotation.y += 0.001;
  particleMesh.rotation.x += 0.0005;

  renderer.render(scene, camera);
};

window.addEventListener('resize', () => {
  const newWidth = container.clientWidth || window.innerWidth;
  const newHeight = container.clientHeight || window.innerHeight;
  camera.aspect = newWidth / newHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(newWidth, newHeight);
});

animate();

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_2 -->
</body>
</html>
